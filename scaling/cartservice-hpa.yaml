# -------------------------------------------------------
# HPA: Auto-scale the cart service
# -------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cartservice-hpa
  namespace: boutique-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cartservice

  minReplicas: 1
  maxReplicas: 6

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 5
