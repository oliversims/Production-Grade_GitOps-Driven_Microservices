# Elasticsearch values for a small 2-node EKS cluster (c7i-flex.large).
# Default chart requests 2Gi memory — too heavy when the cluster also runs
# the boutique app, monitoring, and Filebeat.

nodeSets:
- name: default
  count: 1
  config:
    node.store.allow_mmap: false
  podTemplate:
    spec:
      containers:
      - name: elasticsearch
        env:
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        resources:
          requests:
            memory: 1Gi
            cpu: 500m
          limits:
            memory: 1536Mi
            cpu: 1
