# -------------------------------------------------------
# TARGET GROUP CONFIGURATION: Tell AWS how to route traffic to Prometheus
# -------------------------------------------------------
# This is an AWS-specific custom resource that configures
# how the AWS Load Balancer routes incoming traffic to
# the Prometheus pods running inside the cluster.
#
# The HTTPRoute (prometheus-route) tells the Gateway WHICH service
# to send traffic to. This TargetGroupConfiguration tells AWS
# HOW to register those pods as targets in the Load Balancer.
#
# Think of it as: "Instructions for the AWS Load Balancer
# on HOW to forward traffic to Prometheus."
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: prometheus-tg-config  # Name of this configuration
  namespace: monitoring       # Must be in the monitoring namespace because
                             # that is where the Prometheus service lives

spec:

  # -------------------------------------------------------
  # TARGET REFERENCE: Which service to send traffic to
  # -------------------------------------------------------
  targetReference:
    name: kube-prometheus-stack-prometheus  # The Kubernetes Service in front of Prometheus pods.
                                            # Must match the backendRefs name in HTTProute-prometheus.yaml.
                                            # Created by the kube-prometheus-stack Helm chart.

  # -------------------------------------------------------
  # DEFAULT CONFIGURATION: How to register targets in AWS
  # -------------------------------------------------------
  defaultConfiguration:
    targetType: ip  # Route traffic DIRECTLY to pod IP addresses (recommended for EKS).
                    # Same setting as Grafana, Argo CD, and the boutique app target groups.
